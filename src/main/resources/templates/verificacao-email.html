<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verificar e-mail | IntegraEDU</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body class="auth-body">
<section class="auth-layout">
    <div class="auth-panel">
        <p class="eyebrow">Validacao obrigatoria</p>
        <h1>Confirmar e-mail</h1>
        <p>Para a demonstracao, usamos um codigo exibido apos o cadastro. Digite o e-mail e o codigo recebido.</p>
    </div>
    <form class="auth-card" th:action="@{/verificacao-email}" method="post">
        <div th:if="${erro}" class="alert error" th:text="${erro}"></div>
        <div th:if="${sucesso}" class="alert success" th:text="${sucesso}"></div>
        <label>E-mail cadastrado
            <input type="email" name="email" th:value="${email}" placeholder="voce@exemplo.com">
        </label>
        <label>Codigo de verificacao
            <input type="text" name="codigo" placeholder="EDU-112026">
        </label>
        <button class="button primary full" type="submit">Validar e-mail</button>
        <a class="button ghost full center" th:href="@{/login}">Ir para o login</a>
    </form>
</section>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reunioes | IntegraEDU</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body class="portal-body">
<header class="portal-header">
    <div>
        <p class="eyebrow">Encontros online</p>
        <h1>Reunioes integradas com acesso rapido</h1>
    </div>
    <nav class="portal-nav">
        <a th:href="@{/dashboard}">Dashboard</a>
        <a th:href="@{/alunos}">Estudantes</a>
        <a th:href="@{/mensagens}">Mensagens</a>
        <a th:href="@{/reunioes}" class="active">Reunioes</a>
        <a th:href="@{/logout}">Sair</a>
    </nav>
</header>

<main class="portal-main">
    <section class="meeting-grid">
        <article class="meeting-card large" th:each="reuniao : ${reunioes}">
            <p class="eyebrow" th:text="${reuniao.data + ' - ' + reuniao.horario}">Data</p>
            <h2 th:text="${reuniao.titulo}">Titulo</h2>
            <p th:text="${'Participante principal: ' + reuniao.participantePrincipal}">Participante</p>
            <p th:text="${reuniao.pauta}">Pauta</p>
            <div class="meeting-actions">
                <a class="button primary small" th:href="${reuniao.link}" target="_blank">Entrar na reuniao</a>
                <span th:text="${reuniao.link}">Link</span>
            </div>
        </article>
    </section>
</main>
</body>
</html>
